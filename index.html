<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Bống Xinh - Chuyên đồ Mẹ và Bé chính hãng</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                        display: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FF7EB3',
                        'primary-dark': '#FF4D94',
                        secondary: '#00D2D3',
                        accent: '#FF9F43',
                        surface: '#F8F9FA',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Component Styles */
        body {
            background-color: #F8F9FA;
            color: #1f2937;
            font-family: 'Quicksand', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 80rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .clay-card {
            background-color: white;
            border-radius: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f3f4f6;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .clay-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-color: rgba(255, 126, 179, 0.1);
        }

        .btn-primary {
            background-color: #FF7EB3;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px rgba(255, 126, 179, 0.2);
            cursor: pointer;
        }
        .btn-primary:hover {
            background-color: #FF4D94;
        }
        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-outline {
            background-color: white;
            color: #374151;
            border: 2px solid #f3f4f6;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-outline:hover {
            background-color: #f9fafb;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .category-pill {
            transition: all 0.3s;
            cursor: pointer;
        }
        .category-pill.active {
            border-color: #FF7EB3;
            box-shadow: 0 4px 12px rgba(255, 126, 179, 0.1);
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="sticky top-0 left-0 right-0 bg-white border-b border-gray-50 z-40 h-20 flex items-center shadow-sm">
        <div class="container flex items-center justify-between gap-4">
            <a href="#" class="flex items-center gap-3 group">
                <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 group-hover:scale-105 transition-transform">
                    <i data-lucide="baby" class="text-white w-7 h-7"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-black text-xl tracking-tighter text-gray-900 leading-none" style="font-family: 'Nunito', sans-serif;">SHOP BỐNG XINH</span>
                    <span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mt-0.5">Premium Store</span>
                </div>
            </a>

            <!-- Search (Desktop) -->
            <div class="flex-1 max-w-lg relative hidden lg:block">
                <input 
                    id="search-input"
                    type="text" 
                    placeholder="Ba mẹ muốn tìm sữa, bỉm gì cho bé?"
                    class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-6 py-3.5 text-sm font-medium focus:outline-none focus:border-primary focus:bg-white transition-all pr-12 shadow-sm"
                >
                <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden lg:flex flex-col items-end">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Hotline 24/7</span>
                    <a href="tel:0984158568" class="text-sm font-black text-secondary">0984.158.568</a>
                </div>
                <div class="flex items-center gap-3 p-2 group cursor-pointer">
                    <div class="w-11 h-11 rounded-xl bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-primary/10 group-hover:text-primary transition-all">
                        <i data-lucide="user" class="w-6 h-6"></i>
                    </div>
                </div>
                <div class="relative py-2 px-3 bg-primary/5 rounded-2xl border border-primary/10 flex items-center gap-2 group cursor-pointer hover:bg-primary transition-all">
                    <i data-lucide="shopping-bag" class="text-primary group-hover:text-white transition-colors w-6 h-6"></i>
                    <span class="text-sm font-black text-primary group-hover:text-white hidden sm:inline">2.450k</span>
                    <span class="absolute -top-2 -right-2 bg-secondary text-white text-[10px] font-black px-1.5 py-0.5 rounded-full ring-2 ring-white shadow-sm">2</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Search -->
    <div class="lg:hidden container mt-4">
        <input 
            id="search-input-mobile"
            type="text" 
            placeholder="Tìm kiếm sản phẩm..."
            class="w-full px-5 py-3 rounded-2xl border-2 border-gray-100 bg-white focus:outline-none focus:border-primary transition-all font-medium"
        >
    </div>

    <!-- Main Content -->
    <main>
        <!-- Banner Carousel / Hero -->
        <section class="bg-white pt-6 pb-12">
            <div class="container overflow-visible">
                <div class="relative h-[220px] md:h-[480px] w-full rounded-[2.5rem] overflow-hidden group shadow-xl bg-primary">
                    <img src="https://images.unsplash.com/photo-1544126592-807daa2b567b?q=80&w=2070&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-90 transition-transform duration-1000 group-hover:scale-105" alt="Banner">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-transparent to-transparent flex flex-col justify-center p-8 md:p-16">
                        <span class="inline-block bg-white/20 backdrop-blur-md text-white text-[8px] md:text-[10px] font-black uppercase tracking-[0.3em] px-4 py-2 rounded-full mb-4 w-max">
                            Premium Collection 2026
                        </span>
                        <h2 class="text-white text-2xl md:text-5xl font-black leading-tight mb-4" style="font-family: 'Nunito', sans-serif;">
                            Sản phẩm tốt nhất<br>cho sự phát triển của bé
                        </h2>
                        <button class="btn-primary w-max h-max">Khám phá ngay <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section class="py-8 bg-surface">
            <div class="container overflow-x-auto no-scrollbar">
                <div class="flex gap-6 min-w-max pb-2" id="category-list">
                    <!-- Dynamic categories injected here -->
                </div>
            </div>
        </section>

        <!-- Product Listing -->
        <section class="py-12 bg-white">
            <div class="container">
                <div class="flex items-end justify-between mb-8">
                    <div class="space-y-1">
                        <span class="text-[10px] font-black text-primary uppercase tracking-[0.3em]">Our Collection</span>
                        <h2 class="text-2xl md:text-3xl font-black text-gray-900" id="section-title" style="font-family: 'Nunito', sans-serif;">Tất cả sản phẩm</h2>
                    </div>
                    <div class="flex gap-2">
                         <button class="p-2.5 bg-gray-50 rounded-xl text-gray-400 hover:text-primary transition-colors"><i data-lucide="filter" class="w-5 h-5"></i></button>
                    </div>
                </div>

                <div class="product-grid" id="product-container">
                    <!-- Dynamic products injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav (Mobile Only) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 pb-4 pt-2 z-50 md:hidden flex justify-between items-center shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-primary">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Trang chủ</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-gray-400">
            <i data-lucide="search" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Tìm kiếm</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-gray-400 relative">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span class="absolute top-1 right-2 bg-accent text-white text-[8px] font-black px-1.5 py-0.5 rounded-full ring-2 ring-white">2</span>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Giỏ hàng</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-gray-400">
            <i data-lucide="heart" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Yêu thích</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-gray-400">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Tài khoản</span>
        </a>
    </nav>

    <!-- Floating Contact Buttons -->
    <div class="fixed bottom-24 right-6 md:bottom-10 md:right-10 flex flex-col gap-4 z-50">
        <!-- Zalo Button -->
        <a href="https://zalo.me/0984158568" target="_blank" class="w-14 h-14 bg-[#0068ff] rounded-full shadow-2xl flex items-center justify-center text-white animate-float overflow-hidden group">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" class="w-8 h-8 filter brightness-0 invert group-hover:scale-110 transition-transform" alt="Zalo">
        </a>
        <!-- Call Button -->
        <a href="tel:0984158568" class="w-14 h-14 bg-secondary rounded-full shadow-2xl flex items-center justify-center text-white animate-pulse group">
            <i data-lucide="phone" class="w-6 h-6 fill-current group-hover:rotate-12 transition-transform"></i>
        </a>
    </div>

    <!-- Page Scripts -->
    <script>
        const CATEGORIES = [
            { id: 'all', name: 'Tất cả', icon: '🍼', color: 'bg-[#FFF0F6]' },
            { id: 'Bỉm sữa', name: 'Bỉm sữa', icon: '👶', color: 'bg-[#E6F7FF]' },
            { id: 'Đồ dùng sơ sinh', name: 'Đồ sơ sinh', icon: '🐣', color: 'bg-[#FFF7E6]' },
            { id: 'Thực phẩm ăn dặm', name: 'Ăn dặm', icon: '🥣', color: 'bg-[#F6FFED]' },
            { id: 'Đồ dùng cho mẹ bầu và sau sinh', name: 'Sức khỏe', icon: '🤱', color: 'bg-[#F9F0FF]' },
            { id: 'Đồ chơi', name: 'Đồ chơi', icon: '🧸', color: 'bg-[#FFFBE6]' }
        ];

        const PRODUCTS = [
            {
                id: '1',
                name: 'Tã dán Moony Natural Size NB 63 miếng',
                brand: 'Moony',
                category: 'Bỉm sữa',
                price: 365000,
                originalPrice: 420000,
                imageUrl: 'https://images.unsplash.com/photo-1560851674-7184583f719b?auto=format&fit=crop&q=80&w=400',
                rating: 4.8,
                reviewCount: 124
            },
            {
                id: '2',
                name: 'Tã quần Huggies Platinum Nature Made Size M 58 miếng',
                brand: 'Huggies',
                category: 'Bỉm sữa',
                price: 385000,
                originalPrice: 450000,
                imageUrl: 'https://images.unsplash.com/photo-1519689689253-c258ce070994?auto=format&fit=crop&q=80&w=400',
                rating: 4.9,
                reviewCount: 89
            },
            {
                id: '3',
                name: 'Sữa Meiji Growing Up Formula 800g (1-3 tuổi)',
                brand: 'Meiji',
                category: 'Bỉm sữa',
                price: 460000,
                imageUrl: 'https://images.unsplash.com/photo-1522158632611-f18e65863ea1?auto=format&fit=crop&q=80&w=400',
                rating: 4.7,
                reviewCount: 256
            },
            {
                id: '4',
                name: 'Sữa Blackmores Số 1 Newborn Formula 900g',
                brand: 'Blackmores',
                category: 'Bỉm sữa',
                price: 520000,
                originalPrice: 580000,
                imageUrl: 'https://images.unsplash.com/photo-1557090494-06d997236528?auto=format&fit=crop&q=80&w=400',
                rating: 4.5,
                reviewCount: 178
            },
            {
                id: '5',
                name: 'Máy hút sữa điện đôi Philips Avent cao cấp',
                brand: 'Avent',
                category: 'Đồ dùng cho mẹ bầu và sau sinh',
                price: 3250000,
                imageUrl: 'https://images.unsplash.com/photo-1620188467120-0938b8156641?auto=format&fit=crop&q=80&w=400',
                rating: 5.0,
                reviewCount: 45
            },
            {
                id: '6',
                name: 'Gối chống trào ngược Muslin organic cho bé',
                brand: 'Hàn Quốc',
                category: 'Đồ dùng sơ sinh',
                price: 250000,
                imageUrl: 'https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&q=80&w=400',
                rating: 4.6,
                reviewCount: 32
            },
            {
                id: '7',
                name: 'Bánh ăn dặm Gerber hình sao vị chuối mẫu mới',
                brand: 'Gerber',
                category: 'Thực phẩm ăn dặm',
                price: 75000,
                imageUrl: 'https://images.unsplash.com/photo-1544126592-807daa2b567b?auto=format&fit=crop&q=80&w=400',
                rating: 4.8,
                reviewCount: 512
            },
            {
                id: '8',
                name: 'Bộ 3 khăn sợi tre cao cấp cho bé sơ sinh',
                brand: 'Likado',
                category: 'Đồ dùng sơ sinh',
                price: 45000,
                imageUrl: 'https://images.unsplash.com/photo-1624519183492-f076c888d3e9?auto=format&fit=crop&q=80&w=400',
                rating: 4.9,
                reviewCount: 1205
            }
        ];

        let activeCategory = 'all';
        let searchQuery = '';

        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = CATEGORIES.map(cat => `
                <div onclick="filterByCategory('${cat.id}')" class="category-pill flex flex-col items-center gap-3 group">
                    <div class="w-20 h-20 lg:w-24 lg:h-24 ${cat.color} ${activeCategory === cat.id ? 'ring-4 ring-primary/30 bg-white shadow-xl scale-110' : 'shadow-sm'} rounded-[2rem] border border-white flex items-center justify-center text-4xl lg:text-5xl transition-all duration-300 group-hover:scale-110 group-active:scale-95">
                        ${cat.icon}
                    </div>
                    <span class="text-[11px] lg:text-[12px] font-black uppercase tracking-widest ${activeCategory === cat.id ? 'text-primary scale-110' : 'text-gray-400'} transition-all">${cat.name}</span>
                </div>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            const filtered = PRODUCTS.filter(p => {
                const matchesCat = activeCategory === 'all' || p.category === activeCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    p.brand.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-24 text-center">
                        <div class="bg-gray-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-200">
                             <i data-lucide="search-x" class="w-10 h-10"></i>
                        </div>
                        <h3 class="font-black text-gray-400">Không tìm thấy sản phẩm nào...</h3>
                        <p class="text-xs text-gray-300 font-medium">Hãy thử tìm kiếm với từ khóa khác nhé!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="clay-card !p-0 overflow-hidden group hover:shadow-xl transition-all border border-gray-100">
                    <div class="relative aspect-square overflow-hidden bg-gray-50/50">
                        <img src="${p.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy">
                        <div class="absolute top-4 left-4 bg-primary text-white text-[10px] font-black px-3 py-1.5 rounded-full shadow-lg z-20">YÊU THÍCH</div>
                        <button class="absolute bottom-4 right-4 w-10 h-10 bg-white/90 backdrop-blur-md shadow-lg rounded-xl flex items-center justify-center text-gray-400 hover:text-primary transition-all active:scale-90">
                            <i data-lucide="heart" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="p-5">
                        <span class="text-[10px] font-black text-secondary uppercase tracking-[0.2em] mb-1 block">${p.brand}</span>
                        <h3 class="font-black text-[13px] text-gray-800 line-clamp-2 h-10 mb-3 group-hover:text-primary transition-colors leading-relaxed">${p.name}</h3>
                        <div class="flex items-center gap-1 text-accent mb-4">
                            <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                            <span class="text-[10px] font-black text-gray-500">${p.rating} (${p.reviewCount})</span>
                        </div>
                        <div class="flex items-end justify-between">
                            <div class="flex flex-col">
                                ${p.originalPrice ? `<span class="text-[9px] text-gray-300 line-through font-bold">${p.originalPrice.toLocaleString()}đ</span>` : ''}
                                <span class="text-[15px] font-black text-primary">${p.price.toLocaleString()}đ</span>
                            </div>
                            <button class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 hover:scale-110 active:scale-95 transition-all">
                                <i data-lucide="plus" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Re-initialize icons for newly added HTML
            lucide.createIcons();
        }

        function filterByCategory(id) {
            activeCategory = id;
            const catObj = CATEGORIES.find(c => c.id === id);
            document.getElementById('section-title').innerText = catObj ? catObj.name : 'Tất cả sản phẩm';
            renderCategories();
            renderProducts();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        // Initialize Search Inputs
        ['search-input', 'search-input-mobile'].forEach(inputId => {
            const el = document.getElementById(inputId);
            if (el) {
                el.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    renderProducts();
                });
            }
        });

        // Lifecycle
        window.onclick = function(event) {
            // General click handler if needed
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            renderProducts();
            lucide.createIcons();
        });
    </script>
</body>
</html>
